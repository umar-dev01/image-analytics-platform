version: "3.8"

services:
  backend:
    build: ./backend
    container_name: image-analytics-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: image-analytics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
